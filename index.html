<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Veyrbound V3 – Dark World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  background:#050505;
  color:#eee;
  font-family:Arial;
  padding:10px;
}

.card{
  background:#151515;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
}

button{
  margin:5px;
  padding:10px;
  background:#222;
  color:white;
  border:1px solid #555;
  border-radius:8px;
}

.enemy{
  border:1px solid #444;
  padding:8px;
  margin:5px 0;
}
</style>
</head>

<body>

<h1>💀 DARK (ALRIK) – V3</h1>

<div id="status"></div>

<div class="card">
<h2>Charakter</h2>
HP: <span id="hp"></span><br>
Focus: <span id="focus"></span><br>
Hunger: <span id="hunger"></span><br>
Scars: <span id="scars"></span><br>
</div>

<div class="card">
<h2>Aktionen</h2>
<button onclick="attack()">⚔️ Attack</button>
<button onclick="veyr()">🌑 Veyr</button>
<button onclick="light()">🌕 Light</button>
<button onclick="nextRound()">➡️ Next Round</button>
</div>

<div class="card">
<h2>Gegner</h2>
<div id="enemies"></div>
<button onclick="spawnEnemy()">👹 Spawn Enemy</button>
<button onclick="spawnBoss()">💀 Spawn Boss</button>
</div>

<div class="card">
<h2>Inventory</h2>
<button onclick="heal()">💚 Potion</button>
</div>

<div class="card">
<h2>Log</h2>
<div id="log"></div>
</div>

<script>

let player = {
  hp:13,
  focus:3,
  hunger:1,
  scars:0
}

let enemies = []

function log(t){
  document.getElementById("log").innerHTML =
    t + "<br>" + document.getElementById("log").innerHTML
}

function update(){
  document.getElementById("hp").innerText = player.hp
  document.getElementById("focus").innerText = player.focus
  document.getElementById("hunger").innerText = player.hunger
  document.getElementById("scars").innerText = player.scars

  let s = ""
  if(player.hunger>=8) s="💀 BERSERK"
  document.getElementById("status").innerText = s

  renderEnemies()
}

function renderEnemies(){
  let html=""
  enemies.forEach((e,i)=>{
    html+=`<div class="enemy">
      ${e.name} (${e.hp} HP)
      <button onclick="hitEnemy(${i})">Hit</button>
    </div>`
  })
  document.getElementById("enemies").innerHTML=html
}

function spawnEnemy(){
  enemies.push({
    name:"Creature",
    hp:20,
    dmg:5,
    type:"normal"
  })
  update()
}

function spawnBoss(){
  enemies.push({
    name:"Abyss Lord",
    hp:50,
    dmg:8,
    type:"boss",
    phase:1
  })
  update()
}

function hitEnemy(i){
  enemies[i].hp-=5
  log("Enemy hit")
  if(enemies[i].hp<=0){
    log("Enemy dead")
    enemies.splice(i,1)
  }
  update()
}

function attack(){
  let dmg = Math.floor(Math.random()*6)+3
  if(enemies[0]){
    enemies[0].hp-=dmg
    log("Attack "+dmg)
  }
  update()
}

function veyr(){
  player.hunger++
  let dmg = Math.floor(Math.random()*10)+5
  if(enemies[0]){
    enemies[0].hp-=dmg
    log("Veyr "+dmg)
  }

  if(Math.random()<0.3){
    player.scars++
    log("💀 Kontrollverlust")
  }

  update()
}

function light(){
  if(player.focus<=0) return
  player.focus--
  player.hunger=Math.max(0,player.hunger-1)
  log("Light used")
  update()
}

function nextRound(){
  enemies.forEach(e=>{
    player.hp-=e.dmg
    log(e.name+" hits you")
  })
  update()
}

function heal(){
  player.hp+=5
  log("heal")
  update()
}

update()

</script>

</body>
</html>
