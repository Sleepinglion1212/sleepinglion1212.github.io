<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Veyrbound App</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #e6e6e6;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h1 {
      color: #ff4444;
    }

    .box {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #1a1a1a;
    }

    .stat {
      margin: 10px 0;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>DARK (ALRIK) – VEYRBOUND</h1>

<div class="box">
  <h2>Status</h2>
  <div class="stat">HP: 13 / 33</div>
  <div class="stat">Focus 🌕: 0</div>
  <div class="stat">Hunger 🌑: 0</div>
  <div class="stat">Scars: 0</div>
  <div class="stat">AC: ?</div>
</div>

<div class="box">
  <h2>Combat</h2>
  <div class="stat">Attack: +5</div>
  <div class="stat">Damage: 2W6 + 3</div>
</div>

<p>Faustregel: Licht = Kontrolle • Veyr = Schaden</p>

</body>
</html>
